<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | CarFix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-wrapper">
            <div class="logo">Car<span>Fix</span></div>
        </div>

        <div class="auth-toggle">
            <button class="toggle-btn active" id="btn-buyer" onclick="setMode('buyer')">زبون (مشتري)</button>
            <button class="toggle-btn" id="btn-seller" onclick="setMode('seller')">بائع (متجر)</button>
        </div>

        <form id="registerForm">
            
            
            <div id="buyer-form" class="form-section active">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="buyer-name" class="form-control" placeholder="أدخل اسمك الكامل" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="buyer-email" class="form-control" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="buyer-password" class="form-control" placeholder="••••••••" required minlength="6">
                </div>
            </div>

            
            <div id="seller-form" class="form-section">
                <div class="row-grid">
                    <div class="form-group">
                        <label>الاسم الكامل (المالك)</label>
                        <input type="text" id="seller-name" class="form-control" placeholder="اسمك">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="seller-email" class="form-control" placeholder="shop@example.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>اسم المتجر</label>
                    <input type="text" id="shop-name" class="form-control" placeholder="مثال: متجر الأخوة">
                </div>
                
                <div class="row-grid">
                    <div class="form-group">
                        <label>رقم الهاتف</label>
                        <input type="tel" id="seller-phone" class="form-control" placeholder="0550 XX XX XX">
                    </div>
                    <div class="form-group">
                        <label>الولاية</label>
                        <select id="seller-wilaya" class="form-control" style="cursor:pointer;">
                            <option value="">اختر الولاية...</option>
                            <option value="الجزائر">16 - الجزائر</option>
                            <option value="وهران">31 - وهران</option>
                            <option value="قسنطينة">25 - قسنطينة</option>
                            <option value="البليدة">09 - البليدة</option>
                            <option value="أخرى">أخرى...</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>صورة السجل التجاري أو بطاقة الحرفي (اختياري حالياً)</label>
                    <input type="file" id="shop-file" class="form-control" style="padding: 7px;" accept="image/*,.pdf">
                </div>

                <div class="form-group">
                    <label>كلمة المرور للمتجر</label>
                    <input type="password" id="seller-password" class="form-control" placeholder="••••••••" minlength="6">
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">إنشاء حساب زبون</button>
        </form>

        <div class="form-footer">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            <br><br>
            <a href="index.html" style="color: var(--primary); font-weight: 600;">⬅️ العودة لتصفح المتجر</a>
        </div>
    </div>

    <div class="toast" id="toastMsg">تم إنشاء الحساب بنجاح!</div>

    <script src="shared.js"></script>
    <script src="register.js" defer></script>
</body>
</html>
